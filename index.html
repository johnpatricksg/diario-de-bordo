<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Diário de Bordo · Agência Pilar</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #F4F4F2;
    --bg3: #ECEAE6;
    --text: #1E3D47;
    --text2: #5a7278;
    --text3: #9aabaf;
    --border: rgba(30,61,71,0.12);
    --border2: rgba(30,61,71,0.22);
    --orange: #F26522;
    --orange-light: #FEF0E8;
    --orange-mid: #F8A878;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --amber: #EF9F27;
    --gray: #B4B2A9;
    --blue-light: #E6F1FB;
    --blue-dark: #0C447C;
    --dark: #1E3D47;
    --dark-light: #E8EEF0;
    --dark-mid: #7A9BA4;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .sidebar { width: 220px; background: var(--dark); border-right: none; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; padding: 0 0 1.5rem 0; display: flex; flex-direction: column; gap: 2px; z-index: 10; }
  .sidebar-logo { padding: 1.25rem 1.25rem 1rem; border-bottom: 0.5px solid rgba(255,255,255,0.1); margin-bottom: .5rem; }
  .sidebar-logo .logo-mark { display: flex; flex-direction: column; align-items: center; }
  .sidebar-logo .sub-label { font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.4); letter-spacing: .08em; text-transform: uppercase; text-align: center; margin-top: 8px; }
  .sidebar-section { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: .08em; padding: 8px 1.25rem 4px; margin-top: 8px; }
  .client-btn { width: 100%; text-align: left; padding: 8px 1.25rem; border: none; background: transparent; font-size: 13px; color: rgba(255,255,255,0.6); cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 8px; }
  .client-btn::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); flex-shrink: 0; transition: background .15s; }
  .client-btn:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.9); }
  .client-btn.active { background: rgba(242,101,34,0.2); color: #fff; font-weight: 500; }
  .client-btn.active::before { background: var(--orange); }
  .main { margin-left: 220px; padding: 2rem; max-width: 900px; }
  .topbar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
  .topbar h1 { font-size: 22px; font-weight: 700; color: var(--dark); }
  .topbar p { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .badge { background: var(--orange-light); color: #B84C10; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; border: 0.5px solid var(--orange-mid); }
  .month-tabs { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .week-tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .wtab { padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); transition: all .15s; line-height: 1.3; text-align: center; }
  .wtab:hover { background: var(--bg2); }
  .wtab.active { background: var(--orange-light); color: var(--orange); border-color: var(--orange-mid); font-weight: 600; }
  .wtab.compare.active { background: var(--dark-light); color: var(--dark); border-color: var(--dark-mid); }
  .obj-bar { background: var(--dark-light); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 1.25rem; font-size: 13px; color: var(--text2); line-height: 1.6; border-left: 3px solid var(--orange); }
  .platform-badge { display: inline-flex; align-items: center; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; margin-right: 6px; }
  .badge-meta { background: var(--orange-light); color: #B84C10; }
  .badge-google { background: var(--blue-light); color: var(--blue-dark); }
  .badge-obj { background: var(--dark-light); color: var(--dark); }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
  .card-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 14px; }
  .metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 1rem; }
  .metric { background: var(--bg2); border-radius: var(--radius); padding: 12px; }
  .metric-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .metric-value { font-size: 20px; font-weight: 600; color: var(--text); }
  .kpi-row { display: flex; gap: 8px; margin-bottom: .75rem; flex-wrap: wrap; }
  .kpi { background: var(--bg2); border-radius: var(--radius); padding: 10px 14px; flex: 1; min-width: 110px; }
  .kpi-l { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .kpi-v { font-size: 17px; font-weight: 600; color: var(--text); }
  .budget-bar-wrap { height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; margin-top: 8px; }
  .budget-bar { height: 100%; border-radius: 3px; background: var(--orange); }
  .compare-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1rem; }
  .compare-col { background: var(--bg2); border-radius: var(--radius); padding: 12px; }
  .compare-col h4 { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .04em; }
  .compare-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; }
  .compare-row:last-child { border-bottom: none; }
  .compare-label { color: var(--text2); }
  .compare-val { font-weight: 600; color: var(--text); }
  .trend-up { color: var(--teal); font-size: 11px; }
  .trend-down { color: #993C1D; font-size: 11px; }
  .variation-bar { background: var(--dark-light); border-radius: var(--radius); padding: 10px 14px; font-size: 13px; margin-bottom: .75rem; line-height: 1.8; border-left: 3px solid var(--dark); }
  .mode-btn { padding: 8px 18px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); transition: all .15s; }
  .mode-btn:hover { background: var(--bg2); }
  .mode-active { background: var(--dark-light) !important; color: var(--dark) !important; border-color: var(--dark-mid) !important; font-weight: 600; }
  .sel-chip { padding: 7px 14px; border-radius: var(--radius); font-size: 13px; cursor: pointer; border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); transition: all .15s; text-align:center; line-height:1.3; }
  .sel-chip:hover { background: var(--bg2); }
  .sel-active { background: var(--orange-light) !important; color: var(--orange) !important; border-color: var(--orange-mid) !important; font-weight: 600; }
  textarea { width: 100%; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 10px 12px; font-size: 14px; font-family: inherit; color: var(--text); background: var(--bg); resize: vertical; min-height: 80px; line-height: 1.6; }
  textarea:focus { outline: none; border-color: var(--purple); }
  .action-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid var(--border); }
  .action-item:last-of-type { border-bottom: none; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; cursor: pointer; border: none; }
  .d-done { background: var(--teal); }
  .d-pending { background: var(--amber); }
  .d-todo { background: var(--gray); }
  .action-text-in { flex: 1; }
  .action-text-in input { width: 100%; border: none; font-size: 13px; font-family: inherit; color: var(--text); background: transparent; outline: none; padding: 2px 0; }
  .action-tag-in { font-size: 11px; color: var(--text2); background: transparent; border: none; outline: none; font-family: inherit; width: 100%; margin-top: 2px; }
  .legend { display: flex; gap: 14px; margin-bottom: 12px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .add-btn { width: 100%; margin-top: 10px; padding: 8px; border: 0.5px dashed var(--border2); border-radius: var(--radius); background: transparent; font-size: 13px; color: var(--text2); cursor: pointer; }
  .add-btn:hover { background: var(--bg2); color: var(--text); }
  .save-btn { width: 100%; padding: 11px; background: var(--orange); color: #fff; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: .5rem; transition: background .15s; }
  .save-btn:hover { background: #D4551A; }
  .save-btn.saved { background: var(--teal); }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: #2C2C2A; color: #F1EFE8; font-size: 13px; padding: 10px 16px; border-radius: var(--radius); opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; }
  @media (max-width: 700px) {
    .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; flex-wrap: wrap; padding: 1rem; }
    .main { margin-left: 0; padding: 1rem; }
    .compare-grid { grid-template-columns: 1fr; }
    .metric-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>

function trend(curr, prev, inverted) {
  if (curr == null || prev == null || prev === 0) return '';
  const d = ((curr - prev) / prev * 100);
  const up = inverted ? d < 0 : d > 0;
  const sym = d > 0 ? '▲' : '▼';
  const cls = up ? 'trend-up' : 'trend-down';
  return `<span class="${cls}">${sym} ${Math.abs(d).toFixed(0)}%</span>`;
}

// localStorage = fonte principal (instantâneo)
function lsGet(key) { try { return JSON.parse(localStorage.getItem(key)); } catch(e) { return null; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }

// Síncrono para renderização (usa localStorage)
function getStorage(key) { return lsGet(key); }

// Salva local + nuvem em background
async function setStorage(key, val) {
  lsSet(key, val);
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/diario`, {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({ id: key, conteudo: JSON.stringify(val), atualizado_em: new Date().toISOString() })
    });
    if (!res.ok) {
      const err = await res.text();
      console.error('Supabase erro:', res.status, err);
    } else {
      console.log('Salvo no Supabase:', key);
    }
  } catch(e) { console.error('Erro ao salvar na nuvem:', e); }
}

// Sincroniza dados da nuvem para o localStorage em background
async function syncFromCloud() {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/diario?select=id,conteudo`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
    });
    if (res.ok) {
      const data = await res.json();
      data.forEach(row => { try { lsSet(row.id, JSON.parse(row.conteudo)); } catch(e) {} });
      renderAll(); // re-renderiza com dados da nuvem
    }
  } catch(e) {}
}

// Estrutura de meses
const MONTHS = {
  'abr26': {label:'Abril 2026', short:'Abr/26'},
  'mai26': {label:'Maio 2026',  short:'Mai/26'},
  'jun26': {label:'Junho 2026', short:'Jun/26'},
};

function getMonthsForClient(client) {
  const sems = Object.keys(CLIENTS[client].semanas);
  const months = [];
  Object.keys(MONTHS).forEach(mk => {
    if (sems.some(k => k.startsWith(mk))) months.push(mk);
  });
  return months;
}

function getWeeksForMonth(client, month) {
  return Object.keys(CLIENTS[client].semanas).filter(k => k.startsWith(month));
}

function renderNav() {
  const months = getMonthsForClient(activeClient);

  // Linha 1: abas de meses + comparativo
  let monthHtml = '';
  months.forEach(mk => {
    const active = (activeView !== 'compare' && activeMonth === mk) ? 'active' : '';
    monthHtml += `<div class="wtab ${active}" onclick="selectMonth('${mk}')">${MONTHS[mk].label}</div>`;
  });
  monthHtml += `<div class="wtab compare ${activeView === 'compare' ? 'active' : ''}" onclick="selectView('compare')">⇄ Comparativo</div>`;
  document.getElementById('month-tabs').innerHTML = monthHtml;

  // Linha 2: sub-abas de semanas (só se não for comparativo)
  if (activeView === 'compare') {
    document.getElementById('week-tabs').innerHTML = '';
    return;
  }

  const weeks = getWeeksForMonth(activeClient, activeMonth);
  let weekHtml = '';

  // Botão de semanas individuais
  weeks.forEach((k, i) => {
    // Se for chave mensal (abr26 sem sufixo -sX), mostra como "Total do mês"
    const isMonthly = !k.includes('-s');
    const label = isMonthly ? 'Total do mês' : `Semana ${i + 1}`;
    const sub = isMonthly ? '' : WEEK_LABELS[k].replace(/Sem \d+ · /, '');
    const active = (activeView === 'week' && activeWeek === k) ? 'active' : '';
    weekHtml += `<div class="wtab ${active}" onclick="selectWeek('${k}')">
      ${label}${sub ? `<span style="font-size:10px;opacity:.7;display:block;margin-top:1px">${sub}</span>` : ''}
    </div>`;
  });

  // Botão resultado total do mês (soma das semanas se não tiver período mensal)
  const hasMonthly = weeks.some(k => !k.includes('-s'));
  if (!hasMonthly && weeks.length > 1) {
    const active = activeView === 'month' ? 'active' : '';
    weekHtml += `<div class="wtab ${active}" onclick="selectView('month')">Resultado do mês</div>`;
  }

  document.getElementById('week-tabs').innerHTML = weekHtml;
}

function selectMonth(mk) {
  activeMonth = mk;
  activeView = 'week';
  const weeks = getWeeksForMonth(activeClient, mk);
  activeWeek = weeks[weeks.length - 1]; // última semana do mês
  renderAll();
}

function selectWeek(k) {
  activeView = 'week';
  activeWeek = k;
  renderAll();
}

function renderCompare() {
  const c = CLIENTS[activeClient];
  const allMonths = getMonthsForClient(activeClient);
  const hasGoogle = c.plataformas.includes('google');
  const hasMeta = c.plataformas.includes('meta');

  // ── Cabeçalho com seletor de modo ──
  let html = `
  <div class="card" style="margin-bottom:1rem">
    <div class="card-title">Tipo de comparação</div>
    <div style="display:flex;gap:8px;margin-bottom:0">
      <div onclick="setCompareMode('months')" class="mode-btn ${compareMode==='months'?'mode-active':''}">
        📅 Meses completos
      </div>
      <div onclick="setCompareMode('weeks')" class="mode-btn ${compareMode==='weeks'?'mode-active':''}">
        📆 Semanas específicas
      </div>
    </div>
  </div>`;

  // ── MODO MESES ──
  if (compareMode === 'months') {
    html += `<div class="card" style="margin-bottom:1.25rem">
      <div class="card-title">Selecione os meses</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">`;
    allMonths.forEach(mk => {
      const sel = compareMonths.includes(mk);
      html += `<div onclick="toggleCompareMonth('${mk}')" class="sel-chip ${sel?'sel-active':''}">
        ${MONTHS[mk]?.label||mk}
      </div>`;
    });
    html += `</div></div>`;

    const selected = compareMonths.filter(mk => allMonths.includes(mk));
    if (selected.length < 2) {
      html += `<div class="obj-bar">Selecione pelo menos 2 meses para comparar.</div>`;
      document.getElementById('content').innerHTML = html;
      return;
    }

    // Agrega dados por mês
    function getMonthAgg(mk) {
      const weeks = getWeeksForMonth(activeClient, mk);
      const monthlyKey = weeks.find(k => !k.includes('-s'));
      if (monthlyKey) return c.semanas[monthlyKey];
      let meta = null, google = null;
      weeks.forEach(k => {
        const s = c.semanas[k];
        if (s.meta) {
          if (!meta) meta = {alcance:0,conversas:0,seguidores:0,visitas:0,investimento:0};
          meta.alcance     += s.meta.alcance||0;
          meta.conversas   += s.meta.conversas||0;
          meta.seguidores  += s.meta.seguidores||0;
          meta.visitas     += s.meta.visitas||0;
          meta.investimento+= s.meta.investimento||0;
        }
        if (s.google) {
          if (!google) google = {cliques:0,conversas:0,investimento:0};
          google.cliques    += s.google.cliques||0;
          google.conversas  += s.google.conversas||0;
          google.investimento+=s.google.investimento||0;
        }
      });
      return {meta, google};
    }

    const aggData = {};
    selected.forEach(mk => { aggData[mk] = getMonthAgg(mk); });
    const cols = selected.length;

    html += buildCompareTable(
      'Meta Ads', 'badge-meta', hasMeta,
      selected,
      mk => aggData[mk]?.meta,
      mk => MONTHS[mk]?.label||mk
    );
    html += buildCompareTable(
      'Google Ads', 'badge-google', hasGoogle,
      selected,
      mk => aggData[mk]?.google,
      mk => MONTHS[mk]?.label||mk,
      true
    );

    // Variação entre últimos 2 selecionados
    if (selected.length >= 2) {
      const l = aggData[selected[selected.length-1]]?.meta;
      const p = aggData[selected[selected.length-2]]?.meta;
      if (l && p) {
        html += `<div class="variation-bar">
          <strong>${MONTHS[selected[selected.length-2]]?.short} → ${MONTHS[selected[selected.length-1]]?.short}:</strong>&nbsp;
          Alcance ${trend(l.alcance,p.alcance)}&nbsp;&nbsp;
          ${l.conversas?'Conversas '+trend(l.conversas,p.conversas)+'&nbsp;&nbsp;':''}
          ${l.seguidores?'Seguidores '+trend(l.seguidores,p.seguidores)+'&nbsp;&nbsp;':''}
          Investimento ${trend(l.investimento,p.investimento,true)}
        </div>`;
      }
    }

  // ── MODO SEMANAS ──
  } else {
    html += `<div class="card" style="margin-bottom:1.25rem">
      <div class="card-title">Selecione as semanas (mín. 2)</div>`;

    allMonths.forEach(mk => {
      const weeks = getWeeksForMonth(activeClient, mk).filter(k => k.includes('-s'));
      if (!weeks.length) return;
      html += `<div style="margin-bottom:12px">
        <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">${MONTHS[mk]?.label||mk}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">`;
      weeks.forEach((k, i) => {
        const sel = compareWeeks.includes(k);
        const periodo = (WEEK_LABELS[k]||'').replace(/Sem \d+ · /,'');
        html += `<div onclick="toggleCompareWeek('${k}')" class="sel-chip ${sel?'sel-active':''}">
          Semana ${i+1}
          ${periodo ? `<span style="display:block;font-size:10px;opacity:.65;margin-top:1px">${periodo}</span>` : ''}
        </div>`;
      });
      html += `</div></div>`;
    });
    html += `</div>`;

    if (compareWeeks.length < 2) {
      html += `<div class="obj-bar">Selecione pelo menos 2 semanas para comparar.</div>`;
      document.getElementById('content').innerHTML = html;
      return;
    }

    function weekLabel(k) {
      const mk = allMonths.find(m => k.startsWith(m));
      const ws = mk ? getWeeksForMonth(activeClient,mk).filter(w=>w.includes('-s')) : [];
      const i = ws.indexOf(k);
      return `${MONTHS[mk]?.short||mk} · Sem ${i+1}`;
    }

    html += buildCompareTable(
      'Meta Ads', 'badge-meta', hasMeta,
      compareWeeks,
      k => c.semanas[k]?.meta,
      k => weekLabel(k)
    );
    html += buildCompareTable(
      'Google Ads', 'badge-google', hasGoogle,
      compareWeeks,
      k => c.semanas[k]?.google,
      k => weekLabel(k),
      true
    );

    // Variação entre últimas 2 semanas
    if (compareWeeks.length >= 2) {
      const l = c.semanas[compareWeeks[compareWeeks.length-1]]?.meta;
      const p = c.semanas[compareWeeks[compareWeeks.length-2]]?.meta;
      if (l && p) {
        html += `<div class="variation-bar">
          <strong>${weekLabel(compareWeeks[compareWeeks.length-2])} → ${weekLabel(compareWeeks[compareWeeks.length-1])}:</strong>&nbsp;
          Alcance ${trend(l.alcance,p.alcance)}&nbsp;&nbsp;
          ${l.conversas?'Conversas '+trend(l.conversas,p.conversas)+'&nbsp;&nbsp;':''}
          ${l.seguidores?'Seguidores '+trend(l.seguidores,p.seguidores)+'&nbsp;&nbsp;':''}
          Investimento ${trend(l.investimento,p.investimento,true)}
        </div>`;
      }
    }
  }

  document.getElementById('content').innerHTML = html;
}

// Função auxiliar que monta a tabela de comparação
function buildCompareTable(title, badgeClass, hasPlat, keys, getData, getLabel, isGoogle=false) {
  if (!hasPlat) return '';
  const hasAnyData = keys.some(k => getData(k) != null);
  if (!hasAnyData) return '';

  let html = `<div class="card"><div class="card-title"><span class="platform-badge ${badgeClass}">${title}</span></div>
    <div class="compare-grid" style="grid-template-columns:repeat(${keys.length},1fr)">`;

  keys.forEach(k => {
    const d = getData(k);
    const lbl = getLabel(k);
    if (!d) {
      html += `<div class="compare-col"><h4>${lbl}</h4><div class="compare-row"><span class="compare-label" style="font-style:italic">Sem dados</span></div></div>`;
      return;
    }
    if (isGoogle) {
      const cpConvG = d.conversas>0 ? fmtR(Math.round(d.investimento/d.conversas*100)/100) : '—';
      html += `<div class="compare-col"><h4>${lbl}</h4>
        <div class="compare-row"><span class="compare-label">Cliques</span><span class="compare-val">${fmt(d.cliques)}</span></div>
        <div class="compare-row"><span class="compare-label">Conversas</span><span class="compare-val">${fmt(d.conversas)}</span></div>
        <div class="compare-row"><span class="compare-label">Investido</span><span class="compare-val">${fmtR(d.investimento)}</span></div>
        <div class="compare-row"><span class="compare-label">Custo/conv.</span><span class="compare-val">${cpConvG}</span></div>
      </div>`;
    } else {
      const cpConv = d.conversas>0 ? fmtR(Math.round(d.investimento/d.conversas*100)/100) : null;
      const cpSeg  = d.seguidores>0 ? fmtR(Math.round(d.investimento/d.seguidores*100)/100) : null;
      html += `<div class="compare-col"><h4>${lbl}</h4>
        <div class="compare-row"><span class="compare-label">Alcance</span><span class="compare-val">${fmt(d.alcance)}</span></div>
        ${d.visitas    ? `<div class="compare-row"><span class="compare-label">Visitas</span><span class="compare-val">${fmt(d.visitas)}</span></div>` : ''}
        ${d.seguidores ? `<div class="compare-row"><span class="compare-label">Seguidores</span><span class="compare-val">${fmt(d.seguidores)}</span></div>` : ''}
        ${d.conversas  ? `<div class="compare-row"><span class="compare-label">Conversas</span><span class="compare-val">${fmt(d.conversas)}</span></div>` : ''}
        <div class="compare-row"><span class="compare-label">Investido</span><span class="compare-val">${fmtR(d.investimento)}</span></div>
        ${cpConv ? `<div class="compare-row"><span class="compare-label">Custo/conv.</span><span class="compare-val">${cpConv}</span></div>` : ''}
        ${cpSeg  ? `<div class="compare-row"><span class="compare-label">Custo/seg.</span><span class="compare-val">${cpSeg}</span></div>`  : ''}
      </div>`;
    }
  });
  html += `</div></div>`;
  return html;
}


function toggleCompareMonth(mk) {
  if (compareMonths.includes(mk)) {
    if (compareMonths.length <= 1) return;
    compareMonths = compareMonths.filter(m => m !== mk);
  } else {
    compareMonths.push(mk);
  }
  renderAll();
}

function toggleCompareWeek(k) {
  if (compareWeeks.includes(k)) {
    if (compareWeeks.length <= 1) return;
    compareWeeks = compareWeeks.filter(w => w !== k);
  } else {
    compareWeeks.push(k);
  }
  renderAll();
}

function setCompareMode(mode) {
  compareMode = mode;
  if (mode === 'weeks' && compareWeeks.length < 2) {
    // Auto-select first week of each available month as default
    const months = getMonthsForClient(activeClient);
    compareWeeks = months.map(mk => getWeeksForMonth(activeClient, mk).find(k => k.includes('-s'))).filter(Boolean).slice(0,2);
  }
  renderAll();
}


function getOtims() { return getStorage(`otim__${activeClient}__${activeWeek}`) || []; }
async function saveOtims(arr) { await setStorage(`otim__${activeClient}__${activeWeek}`, arr); }

async function addOtim() {
  const arr = getOtims(); arr.push({text:'', tag:'', status:'todo'}); await saveOtims(arr); renderAll();
}

async function cycleStatus(i) {
  const arr = getOtims();
  const cycle = {todo:'pending', pending:'done', done:'todo'};
  arr[i].status = cycle[arr[i].status || 'todo'];
  await saveOtims(arr); renderAll();
}

async function updateOtim(i, field, val) {
  const arr = getOtims(); arr[i][field] = val; await saveOtims(arr);
}

async function saveData() {
  const btn = document.getElementById('save-btn');
  if (btn) { btn.textContent = 'Salvando...'; btn.disabled = true; }
  try {
    // Save analysis text
    const ta = document.getElementById('nota-ta');
    if (ta) await setStorage(`nota__${activeClient}__${activeWeek}`, ta.value);

    // Save otimizações - collect latest values from DOM
    const otims = getOtims();
    document.querySelectorAll('[data-ai]').forEach(el => {
      const i = parseInt(el.dataset.ai);
      const f = el.dataset.af;
      if (f !== undefined && otims[i] !== undefined) otims[i][f] = el.value;
    });
    await setStorage(`otim__${activeClient}__${activeWeek}`, otims);

    if (btn) { btn.textContent = 'Salvo! ✓'; btn.classList.add('saved'); btn.disabled = false; }
    const toast = document.getElementById('toast');
    if (toast) { toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500); }
  } catch(e) {
    console.error('Erro ao salvar:', e);
    if (btn) { btn.textContent = 'Erro ao salvar'; btn.disabled = false; }
  }
  setTimeout(() => { if (btn) { btn.textContent = 'Salvar semana'; btn.classList.remove('saved'); } }, 2500);
}

function renderAll() {
  const c = CLIENTS[activeClient];
  document.getElementById('main-title').textContent = activeClient;
  document.getElementById('main-sub').textContent = c.plataformas.map(p => p === 'meta' ? 'Meta Ads' : 'Google Ads').join(' + ') + ` · Orçamento R$ ${(c.orcamento.meta + c.orcamento.google).toLocaleString('pt-BR')}/mês`;
  renderSidebar();
  renderNav();
  if (activeView === 'compare') renderCompare();
  else if (activeView === 'month') renderMonthTotal();
  else renderWeek();
}

// Auto-populate compareWeeks with first available week per month
const _initAllMonths = getMonthsForClient(activeClient);
compareWeeks = _initAllMonths
  .map(mk => getWeeksForMonth(activeClient, mk).find(k => k.includes('-s')))
  .filter(Boolean)
  .slice(0, 2);

renderAll();
syncFromCloud();
</script>
</body>
