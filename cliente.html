<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Relatório de Tráfego · Agência Pilar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#F4F4F2;--bg3:#ECEAE6;
  --text:#1E3D47;--text2:#5a7278;--text3:#9aabaf;
  --border:rgba(30,61,71,0.12);--border2:rgba(30,61,71,0.22);
  --orange:#F26522;--orange-light:#FEF0E8;--orange-mid:#F8A878;
  --teal:#1D9E75;--teal-light:#E1F5EE;--amber:#EF9F27;--gray:#B4B2A9;
  --blue-light:#E6F1FB;--blue-dark:#0C447C;
  --dark:#1E3D47;--dark-light:#E8EEF0;--dark-mid:#7A9BA4;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh}
.topbar{background:var(--dark);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.topbar img{height:48px;width:auto}
.topbar-right{text-align:right}
.topbar-right .client-name{font-size:18px;font-weight:600;color:var(--text)}
.topbar-right .client-obj{font-size:12px;color:var(--text2);margin-top:2px}
.main{max-width:820px;margin:0 auto;padding:1.5rem}
.month-tabs{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.week-tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
.wtab{padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);transition:all .15s;line-height:1.3;text-align:center}
.wtab:hover{background:var(--bg2)}
.wtab.active{background:var(--orange-light);color:var(--orange);border-color:var(--orange-mid);font-weight:600}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
.card-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:.5rem}
.metric{background:var(--bg2);border-radius:var(--radius);padding:12px}
.metric-label{font-size:11px;color:var(--text2);margin-bottom:4px}
.metric-value{font-size:20px;font-weight:600;color:var(--text)}
.platform-badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;margin-right:6px}
.badge-meta{background:var(--orange-light);color:#B84C10}
.badge-google{background:var(--blue-light);color:var(--blue-dark)}
.badge-obj{background:var(--dark-light);color:var(--dark)}
.obj-bar{background:var(--dark-light);border-radius:var(--radius);padding:10px 14px;margin-bottom:1.25rem;font-size:13px;color:var(--text2);line-height:1.6;border-left:3px solid var(--orange)}
.kpi-row{display:flex;gap:8px;margin-bottom:.75rem;flex-wrap:wrap}
.kpi{background:var(--bg2);border-radius:var(--radius);padding:10px 14px;flex:1;min-width:110px}
.kpi-l{font-size:11px;color:var(--text2);margin-bottom:3px}
.kpi-v{font-size:17px;font-weight:600;color:var(--text)}
.budget-bar-wrap{height:6px;background:var(--bg2);border-radius:3px;overflow:hidden;margin-top:8px}
.budget-bar{height:100%;border-radius:3px;background:var(--orange)}
.analise-box{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;font-size:14px;color:var(--text);line-height:1.7;white-space:pre-wrap}
.action-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border)}
.action-item:last-child{border-bottom:none}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.d-done{background:#1D9E75}.d-pending{background:#EF9F27}.d-todo{background:#B4B2A9}
.action-text{font-size:13px;color:var(--text);flex:1;line-height:1.5}
.legend{display:flex;gap:14px;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.legend-dot{width:8px;height:8px;border-radius:50%}
.empty{text-align:center;padding:2rem;color:var(--text2);font-size:14px}
.warn-box{background:#FEF3CD;border:0.5px solid #FFD97D;border-radius:var(--radius);padding:10px 14px;font-size:13px;color:#856404;margin-bottom:8px;grid-column:1/-1}
.compare-col{background:var(--bg2);border-radius:var(--radius);padding:12px}
.compare-col h4{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.compare-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:12px}
.compare-row:last-child{border-bottom:none}
.compare-label{color:var(--text2)}
.compare-val{font-weight:600;color:var(--text)}
.wtab.compare-active{background:var(--dark-light);color:var(--dark);border-color:var(--dark-mid);font-weight:600}
.access-denied{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;padding:2rem}
.access-denied h2{font-size:20px;font-weight:600;color:var(--text);margin-bottom:8px}
.access-denied p{font-size:14px;color:var(--text2)}
</style>
</head>

// ── Helpers ──
const fmt  = n => n!=null?n.toLocaleString('pt-BR'):'—';
const fmtR = n => n!=null?'R$ '+(Math.round(n*100)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';

function getMonthsForClient(name){
  const sems=Object.keys(CLIENTS[name].semanas);
  return Object.keys(MONTHS).filter(mk=>sems.some(k=>k.startsWith(mk)));
}
function getWeeksForMonth(name,month){
  return Object.keys(CLIENTS[name].semanas).filter(k=>k.startsWith(month));
}

// ── Render Nav ──
function renderNav(){
  const months=getMonthsForClient(clientName);

  // Linha 1: meses + botão comparativo
  let mHtml='';
  months.forEach(mk=>{
    const active=(activeView==='week'&&activeMonth===mk)?'active':'';
    mHtml+=`<div class="wtab ${active}" onclick="selectMonth('${mk}')">${MONTHS[mk].label}</div>`;
  });
  mHtml+=`<div class="wtab compare ${activeView==='compare'?'compare-active':''}" onclick="selectView('compare')">⇄ Comparativo</div>`;
  document.getElementById('month-tabs').innerHTML=mHtml;

  // Linha 2: semanas do mês (só se não for comparativo)
  if(activeView==='compare'){
    document.getElementById('week-tabs').innerHTML='';
    return;
  }
  const weeks=getWeeksForMonth(clientName,activeMonth);
  let wHtml='';
  weeks.forEach((k,i)=>{
    const isMonthly=!k.includes('-s');
    const label=isMonthly?'Total do mês':`Semana ${i+1}`;
    const sub=isMonthly?'':(WEEK_LABELS[k]||'').replace(/Sem \d+ · /,'');
    const active=activeWeek===k?'active':'';
    wHtml+=`<div class="wtab ${active}" onclick="selectWeek('${k}')">${label}${sub?`<span style="font-size:10px;opacity:.65;display:block;margin-top:1px">${sub}</span>`:''}</div>`;
  });
  document.getElementById('week-tabs').innerHTML=wHtml;
}

function selectMonth(mk){
  activeView='week';
  activeMonth=mk;
  const weeks=getWeeksForMonth(clientName,mk);
  activeWeek=weeks[weeks.length-1];
  render();
}
function selectWeek(k){activeView='week';activeWeek=k;render();}
function selectView(v){activeView=v;render();}
function setCompareMode(mode){
  compareMode=mode;
  if(mode==='weeks'&&compareWeeks.length<2){
    const months=getMonthsForClient(clientName);
    compareWeeks=months.map(mk=>getWeeksForMonth(clientName,mk).find(k=>k.includes('-s'))).filter(Boolean).slice(0,2);
  }
  render();
}
function toggleCompareMonth(mk){
  if(compareMonths.includes(mk)){if(compareMonths.length<=1)return;compareMonths=compareMonths.filter(m=>m!==mk);}
  else compareMonths.push(mk);
  render();
}
function toggleCompareWeek(k){
  if(compareWeeks.includes(k)){if(compareWeeks.length<=1)return;compareWeeks=compareWeeks.filter(w=>w!==k);}
  else compareWeeks.push(k);
  render();
}

// ── Render Content ──
async function render(){
  renderNav();
  if(activeView==='compare'){renderCompare();return;}
  const c=CLIENTS[clientName];
  const sem=c.semanas[activeWeek];
  if(!sem){document.getElementById('content').innerHTML='<div class="empty">Sem dados para este período.</div>';return;}

  const hasMeta=c.plataformas.includes('meta');
  const hasGoogle=c.plataformas.includes('google');
  const totalOrc=c.orcamento.meta+c.orcamento.google;
  const investMeta=sem.meta?.investimento||0;
  const investGoogle=sem.google?.investimento||0;
  const totalInvest=investMeta+investGoogle;
  const pct=totalOrc>0?Math.min(Math.round((totalInvest/totalOrc)*100),100):0;

  let html=`<div class="card"><div class="card-title">Investimento</div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-l">Orçamento mensal</div><div class="kpi-v">${fmtR(totalOrc)}</div></div>
      <div class="kpi"><div class="kpi-l">Investido no período</div><div class="kpi-v">${fmtR(totalInvest)}</div></div>
    </div>
    <div class="budget-bar-wrap"><div class="budget-bar" style="width:${pct}%"></div></div>
  </div>`;

  if(hasMeta&&sem.meta){
    const m=sem.meta;
    const cpConv=m.conversas>0?Math.round(m.investimento/m.conversas*100)/100:null;
    const cpSeg=m.seguidores>0?Math.round(m.investimento/m.seguidores*100)/100:null;
    const cpm=m.alcance>0?Math.round((m.investimento/m.alcance)*1000*100)/100:null;
    html+=`<div class="card"><div class="card-title"><span class="platform-badge badge-meta">Meta Ads</span></div><div class="metric-grid">`;
    if(m.obs) html+=`<div class="warn-box">⚠️ ${m.obs}</div>`;
    html+=`<div class="metric"><div class="metric-label">Alcance</div><div class="metric-value">${fmt(m.alcance)}</div></div>`;
    if(m.visitas!=null) html+=`<div class="metric"><div class="metric-label">Visitas ao perfil</div><div class="metric-value">${fmt(m.visitas)}</div></div>`;
    if(m.seguidores!=null) html+=`<div class="metric"><div class="metric-label">Novos seguidores</div><div class="metric-value">+${fmt(m.seguidores)}</div></div>`;
    if(m.conversas!=null) html+=`<div class="metric"><div class="metric-label">Conversas iniciadas</div><div class="metric-value">${fmt(m.conversas)}</div></div>`;
    html+=`<div class="metric"><div class="metric-label">Investimento</div><div class="metric-value">${fmtR(m.investimento)}</div></div>`;
    if(cpConv) html+=`<div class="metric"><div class="metric-label">Custo/conversa</div><div class="metric-value">${fmtR(cpConv)}</div></div>`;
    if(cpSeg)  html+=`<div class="metric"><div class="metric-label">Custo/seguidor</div><div class="metric-value">${fmtR(cpSeg)}</div></div>`;
    if(cpm)    html+=`<div class="metric"><div class="metric-label">CPM estimado</div><div class="metric-value">${fmtR(cpm)}</div></div>`;
    html+=`</div></div>`;
  }

  if(hasGoogle&&sem.google){
    const g=sem.google;
    const cpConvG=g.conversas>0?Math.round(g.investimento/g.conversas*100)/100:null;
    html+=`<div class="card"><div class="card-title"><span class="platform-badge badge-google">Google Ads</span></div><div class="metric-grid">`;
    if(g.obs) html+=`<div class="warn-box">⚠️ ${g.obs}</div>`;
    html+=`<div class="metric"><div class="metric-label">Cliques</div><div class="metric-value">${fmt(g.cliques)}</div></div>`;
    if(g.cpc!=null) html+=`<div class="metric"><div class="metric-label">CPC médio</div><div class="metric-value">${fmtR(g.cpc)}</div></div>`;
    if(g.conversas!=null) html+=`<div class="metric"><div class="metric-label">Conversas iniciadas</div><div class="metric-value">${fmt(g.conversas)}</div></div>`;
    html+=`<div class="metric"><div class="metric-label">Investimento</div><div class="metric-value">${fmtR(g.investimento)}</div></div>`;
    if(cpConvG) html+=`<div class="metric"><div class="metric-label">Custo/conversa</div><div class="metric-value">${fmtR(cpConvG)}</div></div>`;
    html+=`</div></div>`;
  }

  // Análise
  const notaKey=`nota__${clientName}__${activeWeek}`;
  const nota=await getStorage(notaKey);
  if(nota){
    html+=`<div class="card"><div class="card-title">Análise da semana</div><div class="analise-box">${nota}</div></div>`;
  }

  // Ações de otimização
  const otimKey=`otim__${clientName}__${activeWeek}`;
  const otims=await getStorage(otimKey);
  if(otims&&otims.length>0){
    const colors={done:'#1D9E75',pending:'#EF9F27',todo:'#B4B2A9'};
    const labels={done:'Concluído',pending:'Em andamento',todo:'Pendente'};
    html+=`<div class="card"><div class="card-title">Ações de otimização</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>Concluído</div>
        <div class="legend-item"><div class="legend-dot" style="background:#EF9F27"></div>Em andamento</div>
        <div class="legend-item"><div class="legend-dot" style="background:#B4B2A9"></div>Pendente</div>
      </div>`;
    otims.forEach(a=>{
      const status=a.status||'todo';
      html+=`<div class="action-item">
        <div class="dot d-${status}" style="background:${colors[status]}"></div>
        <div class="action-text">${a.text||''}${a.tag?`<div style="font-size:11px;color:var(--text2);margin-top:2px">${a.tag}</div>`:''}</div>
      </div>`;
    });
    html+=`</div>`;
  }

  document.getElementById('content').innerHTML=html;
}

// ── Init ──
function showAccessDenied(){
  document.getElementById('month-tabs').innerHTML='';
  document.getElementById('week-tabs').innerHTML='';
  document.getElementById('content').innerHTML=`
    <div class="access-denied">
      <h2>Link inválido</h2>
      <p>Verifique o link enviado pela Agência Pilar.</p>
    </div>`;
  document.getElementById('client-name').textContent='Acesso negado';
}

function renderCompare(){
  const c=CLIENTS[clientName];
  const allMonths=getMonthsForClient(clientName);
  const hasMeta=c.plataformas.includes('meta');
  const hasGoogle=c.plataformas.includes('google');
  const fmt2=n=>n!=null?n.toLocaleString('pt-BR'):'—';
  const fmtR2=n=>n!=null?'R$ '+(Math.round(n*100)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';

  let html=`<div class="card" style="margin-bottom:1rem">
    <div class="card-title">Tipo de comparação</div>
    <div style="display:flex;gap:8px;margin-bottom:0">
      <div onclick="setCompareMode('months')" style="padding:8px 18px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid ${compareMode==='months'?'var(--orange)':'var(--border2)'};background:${compareMode==='months'?'var(--orange-light)':'var(--bg)'};color:${compareMode==='months'?'var(--orange)':'var(--text2)'};font-weight:${compareMode==='months'?'600':'400'}">📅 Meses completos</div>
      <div onclick="setCompareMode('weeks')" style="padding:8px 18px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid ${compareMode==='weeks'?'var(--orange)':'var(--border2)'};background:${compareMode==='weeks'?'var(--orange-light)':'var(--bg)'};color:${compareMode==='weeks'?'var(--orange)':'var(--text2)'};font-weight:${compareMode==='weeks'?'600':'400'}">📆 Semanas específicas</div>
    </div>
  </div>`;

  // ── MODO MESES ──
  if(compareMode==='months'){
    html+=`<div class="card" style="margin-bottom:1.25rem"><div class="card-title">Selecione os meses</div><div style="display:flex;gap:8px;flex-wrap:wrap">`;
    allMonths.forEach(mk=>{
      const sel=compareMonths.includes(mk);
      html+=`<div onclick="toggleCompareMonth('${mk}')" style="padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;border:0.5px solid ${sel?'var(--orange)':'var(--border2)'};background:${sel?'var(--orange-light)':'var(--bg)'};color:${sel?'var(--orange)':'var(--text2)'};font-weight:${sel?'600':'400'}">${MONTHS[mk]?.label||mk}</div>`;
    });
    html+=`</div></div>`;

    const selected=compareMonths.filter(mk=>allMonths.includes(mk));
    if(selected.length<2){document.getElementById('content').innerHTML=html+'<div class="obj-bar">Selecione pelo menos 2 meses.</div>';return;}

    function getMonthAgg(mk){
      const weeks=getWeeksForMonth(clientName,mk);
      const mkey=weeks.find(k=>!k.includes('-s'));
      if(mkey)return c.semanas[mkey];
      let meta=null,google=null;
      weeks.forEach(k=>{
        const s=c.semanas[k];
        if(s.meta){if(!meta)meta={alcance:0,conversas:0,seguidores:0,visitas:0,investimento:0};
          meta.alcance+=s.meta.alcance||0;meta.conversas+=s.meta.conversas||0;
          meta.seguidores+=s.meta.seguidores||0;meta.visitas+=s.meta.visitas||0;
          meta.investimento+=s.meta.investimento||0;}
        if(s.google){if(!google)google={cliques:0,conversas:0,investimento:0};
          google.cliques+=s.google.cliques||0;google.conversas+=s.google.conversas||0;
          google.investimento+=s.google.investimento||0;}
      });
      return{meta,google};
    }

    const agg={};selected.forEach(mk=>{agg[mk]=getMonthAgg(mk);});

    if(hasMeta){
      html+=`<div class="card"><div class="card-title"><span class="platform-badge badge-meta">Meta Ads</span>· Comparativo de meses</div><div style="display:grid;grid-template-columns:repeat(${selected.length},1fr);gap:10px">`;
      selected.forEach(mk=>{
        const d=agg[mk]?.meta;
        const lbl=MONTHS[mk]?.label||mk;
        if(!d){html+=`<div class="compare-col"><h4>${lbl}</h4><div style="font-size:12px;color:var(--text2);padding:8px 0">Sem dados</div></div>`;return;}
        const cpConv=d.conversas>0?fmtR2(Math.round(d.investimento/d.conversas*100)/100):null;
        const cpSeg=d.seguidores>0?fmtR2(Math.round(d.investimento/d.seguidores*100)/100):null;
        html+=`<div class="compare-col"><h4>${lbl}</h4>
          <div class="compare-row"><span class="compare-label">Alcance</span><span class="compare-val">${fmt2(d.alcance)}</span></div>
          ${d.visitas?`<div class="compare-row"><span class="compare-label">Visitas</span><span class="compare-val">${fmt2(d.visitas)}</span></div>`:''}
          ${d.seguidores?`<div class="compare-row"><span class="compare-label">Seguidores</span><span class="compare-val">+${fmt2(d.seguidores)}</span></div>`:''}
          ${d.conversas?`<div class="compare-row"><span class="compare-label">Conversas</span><span class="compare-val">${fmt2(d.conversas)}</span></div>`:''}
          <div class="compare-row"><span class="compare-label">Investido</span><span class="compare-val">${fmtR2(d.investimento)}</span></div>
          ${cpConv?`<div class="compare-row"><span class="compare-label">Custo/conv.</span><span class="compare-val">${cpConv}</span></div>`:''}
          ${cpSeg?`<div class="compare-row"><span class="compare-label">Custo/seg.</span><span class="compare-val">${cpSeg}</span></div>`:''}
        </div>`;
      });
      html+=`</div></div>`;
    }

    if(hasGoogle&&selected.some(mk=>agg[mk]?.google)){
      html+=`<div class="card"><div class="card-title"><span class="platform-badge badge-google">Google Ads</span>· Comparativo de meses</div><div style="display:grid;grid-template-columns:repeat(${selected.length},1fr);gap:10px">`;
      selected.forEach(mk=>{
        const g=agg[mk]?.google;
        const lbl=MONTHS[mk]?.label||mk;
        if(!g){html+=`<div class="compare-col"><h4>${lbl}</h4><div style="font-size:12px;color:var(--text2);padding:8px 0">Sem dados</div></div>`;return;}
        const cpConvG=g.conversas>0?fmtR2(Math.round(g.investimento/g.conversas*100)/100):null;
        html+=`<div class="compare-col"><h4>${lbl}</h4>
          <div class="compare-row"><span class="compare-label">Cliques</span><span class="compare-val">${fmt2(g.cliques)}</span></div>
          <div class="compare-row"><span class="compare-label">Conversas</span><span class="compare-val">${fmt2(g.conversas)}</span></div>
          <div class="compare-row"><span class="compare-label">Investido</span><span class="compare-val">${fmtR2(g.investimento)}</span></div>
          ${cpConvG?`<div class="compare-row"><span class="compare-label">Custo/conv.</span><span class="compare-val">${cpConvG}</span></div>`:''}
        </div>`;
      });
      html+=`</div></div>`;
    }

  // ── MODO SEMANAS ──
  }else{
    html+=`<div class="card" style="margin-bottom:1.25rem"><div class="card-title">Selecione as semanas (mín. 2)</div>`;
    allMonths.forEach(mk=>{
      const weeks=getWeeksForMonth(clientName,mk).filter(k=>k.includes('-s'));
      if(!weeks.length)return;
      html+=`<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">${MONTHS[mk]?.label||mk}</div><div style="display:flex;gap:6px;flex-wrap:wrap">`;
      weeks.forEach((k,i)=>{
        const sel=compareWeeks.includes(k);
        const periodo=(WEEK_LABELS[k]||'').replace(/Sem \d+ · /,'');
        html+=`<div onclick="toggleCompareWeek('${k}')" style="padding:6px 14px;border-radius:var(--radius);font-size:13px;cursor:pointer;border:0.5px solid ${sel?'var(--orange)':'var(--border2)'};background:${sel?'var(--orange-light)':'var(--bg)'};color:${sel?'var(--orange)':'var(--text2)'};font-weight:${sel?'600':'400'};text-align:center;line-height:1.3">Semana ${i+1}${periodo?`<span style="display:block;font-size:10px;opacity:.65;margin-top:1px">${periodo}</span>`:''}</div>`;
      });
      html+=`</div></div>`;
    });
    html+=`</div>`;

    if(compareWeeks.length<2){document.getElementById('content').innerHTML=html+'<div class="obj-bar">Selecione pelo menos 2 semanas.</div>';return;}

    function weekLabel(k){
      const mk=allMonths.find(m=>k.startsWith(m));
      const ws=mk?getWeeksForMonth(clientName,mk).filter(w=>w.includes('-s')):[];
      return`${MONTHS[mk]?.short||mk} · Sem ${ws.indexOf(k)+1}`;
    }

    if(hasMeta){
      html+=`<div class="card"><div class="card-title"><span class="platform-badge badge-meta">Meta Ads</span>· Comparativo de semanas</div><div style="display:grid;grid-template-columns:repeat(${compareWeeks.length},1fr);gap:10px">`;
      compareWeeks.forEach(k=>{
        const m=c.semanas[k]?.meta;
        const lbl=weekLabel(k);
        if(!m){html+=`<div class="compare-col"><h4>${lbl}</h4><div style="font-size:12px;color:var(--text2)">Sem dados</div></div>`;return;}
        const cpConv=m.conversas>0?fmtR2(Math.round(m.investimento/m.conversas*100)/100):null;
        const cpSeg=m.seguidores>0?fmtR2(Math.round(m.investimento/m.seguidores*100)/100):null;
        html+=`<div class="compare-col"><h4>${lbl}</h4>
          <div class="compare-row"><span class="compare-label">Alcance</span><span class="compare-val">${fmt2(m.alcance)}</span></div>
          ${m.visitas?`<div class="compare-row"><span class="compare-label">Visitas</span><span class="compare-val">${fmt2(m.visitas)}</span></div>`:''}
          ${m.seguidores?`<div class="compare-row"><span class="compare-label">Seguidores</span><span class="compare-val">+${fmt2(m.seguidores)}</span></div>`:''}
          ${m.conversas?`<div class="compare-row"><span class="compare-label">Conversas</span><span class="compare-val">${fmt2(m.conversas)}</span></div>`:''}
          <div class="compare-row"><span class="compare-label">Investido</span><span class="compare-val">${fmtR2(m.investimento)}</span></div>
          ${cpConv?`<div class="compare-row"><span class="compare-label">Custo/conv.</span><span class="compare-val">${cpConv}</span></div>`:''}
          ${cpSeg?`<div class="compare-row"><span class="compare-label">Custo/seg.</span><span class="compare-val">${cpSeg}</span></div>`:''}
        </div>`;
      });
      html+=`</div></div>`;
    }

    if(hasGoogle&&compareWeeks.some(k=>c.semanas[k]?.google)){
      html+=`<div class="card"><div class="card-title"><span class="platform-badge badge-google">Google Ads</span>· Comparativo de semanas</div><div style="display:grid;grid-template-columns:repeat(${compareWeeks.length},1fr);gap:10px">`;
      compareWeeks.forEach(k=>{
        const g=c.semanas[k]?.google;
        const lbl=weekLabel(k);
        if(!g){html+=`<div class="compare-col"><h4>${lbl}</h4><div style="font-size:12px;color:var(--text2)">Sem dados</div></div>`;return;}
        const cpConvG=g.conversas>0?fmtR2(Math.round(g.investimento/g.conversas*100)/100):null;
        html+=`<div class="compare-col"><h4>${lbl}</h4>
          <div class="compare-row"><span class="compare-label">Cliques</span><span class="compare-val">${fmt2(g.cliques)}</span></div>
          <div class="compare-row"><span class="compare-label">Conversas</span><span class="compare-val">${fmt2(g.conversas)}</span></div>
          <div class="compare-row"><span class="compare-label">Investido</span><span class="compare-val">${fmtR2(g.investimento)}</span></div>
          ${cpConvG?`<div class="compare-row"><span class="compare-label">Custo/conv.</span><span class="compare-val">${cpConvG}</span></div>`:''}
        </div>`;
      });
      html+=`</div></div>`;
    }
  }

  document.getElementById('content').innerHTML=html;
}

(async()=>{
  const params=new URLSearchParams(window.location.search);
  const token=params.get('id');
  clientName=Object.keys(TOKEN_MAP).find(k=>TOKEN_MAP[k]===token);

  if(!clientName){showAccessDenied();return;}

  document.getElementById('client-name').textContent=clientName;
  document.getElementById('client-name').textContent=clientName;
  document.getElementById('client-obj').textContent=CLIENTS[clientName].objetivo;
  const logoEl=document.getElementById('client-logo');
  if(CLIENT_LOGOS[clientName]){logoEl.src=CLIENT_LOGOS[clientName];logoEl.alt=clientName;}
  document.getElementById('client-obj').textContent=CLIENTS[clientName].objetivo;

  const months=getMonthsForClient(clientName);
  activeMonth=months[months.length-1];
  const weeks=getWeeksForMonth(clientName,activeMonth);
  activeWeek=weeks[weeks.length-1];
  compareMonths=months.slice(-2);
  compareWeeks=months.map(mk=>getWeeksForMonth(clientName,mk).find(k=>k.includes('-s'))).filter(Boolean).slice(0,2);

  await render();
})();
</script>
